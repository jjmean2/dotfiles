# mouse 휠 스크롤 등의 조작이 동작하도록
set-option -g mouse on

# 복사모드에서 vi 바인딩을 쓰도록 (emacs, vi 가능)
# EDITOR=vim 등의 환경변수가 있으면 기본값이 vi가 되고, 그 외에는 기본값이 emacs인 듯
set-window-option -g mode-keys vi

# 명령줄에서 emacs 바인딩을 쓰도록 (emacs, vi 가능)
# EDITOR=vim 등의 환경변수가 있으면 기본값이 vi가 되고, 그 외에는 기본값이 emacs인 듯
set-option -g status-keys emacs

# 새 창을 열 때, 현재 디렉토리에서 시작하기
bind-key -T prefix c new-window -c "#{pane_current_path}"
bind-key -T prefix '"' split-window -c "#{pane_current_path}"
bind-key -T prefix % split-window -h -c "#{pane_current_path}"

# scrollback buffer를 늘리기
set-option -g history-limit 5000

# 상태바 현재창 스타일 변경
set-option -g window-status-current-style "bg=white"

# === OS 전용 설정과 로컬 오버라이드 로드 ===
# -q 를 주면 파일이 없어도 에러 없이 조용히 넘어간다. jw-stow 가 설치 시점에 반대
# 플랫폼 파일은 아예 심링크하지 않으므로, 실제로는 darwin/linux 중 하나만 존재한다.
source-file -q ~/.tmux.conf.darwin
source-file -q ~/.tmux.conf.linux
source-file -q ~/.tmux.conf.local

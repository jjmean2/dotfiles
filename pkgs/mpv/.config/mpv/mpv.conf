
# 1. 창 관리
save-position-on-quit=yes # 모든 파일에 대해 Shift+Q 효과 적용 (이어보기 자동화)
# autofit=50%                 # 처음 열릴 때 화면의 50% 크기로 시작
# geometry=100%:100%          # 우측 하단 구석에서 시작
keep-open=always
ontop=yes

# 2. 자막 가독성 (개발자 폰트 스타일)
sub-font='JetBrains Mono' # 종완님이 좋아하실만한 코딩용 폰트 적용 가능
sub-font-size=40
sub-color='#FFFF00' # 노란색 자막

hwdec=auto

# 한국어 자막이 있으면 우선적으로 선택, 없으면 영어 선택
slang=ko,kor,en,eng

# --- 자막 스타일 설정 ---
# sub-font="NanumGothic"      # 폰트 이름 (시스템에 설치된 정확한 폰트명)
# sub-font-size=45            # 자막 크기 (기본값은 보통 55)
# sub-color="#FFFFFFFF"       # 자막 색상 (HEX 코드, ARGB 방식 가능)
# sub-border-color="#FF000000" # 테두리 색상
# sub-border-size=2           # 테두리 두께
# sub-shadow-offset=1         # 그림자 깊이
# sub-shadow-color="#33000000" # 그림자 색상 (투명도 포함)

# --- 자막 위치 및 기타 ---
# sub-pos=95                  # 자막 높이 (0~100, 숫자가 클수록 아래쪽)
# sub-margin-y=30             # 하단 여백
# sub-align-y=bottom          # 수직 정렬 (top, center, bottom)
# sub-ass-override=force      # ASS/SSA 자막의 자체 스타일을 무시하고 위 설정을 강제 적용
# 스크린샷 저장 경로 지정 (예: 데스크탑의 mpv_screenshots 폴더)
# macOS/Linux 예시:
screenshot-directory="/Users/ljw/Library/Mobile Documents/com~apple~CloudDocs/Screenshots"

# Windows 예시:
# screenshot-directory="C:\Users\Wani\Desktop\Screenshots"

# 파일 이름 형식 (영상제목-시간-번호) 기본값은 "mpv-shot%n"
# %F: 파일명 - 확장자를 제외한 전체 파일 이름
# %f: 파일명 + 확장자 - 확장자까지 포함한 파일 이름
# %P: 재생 시간 - H:MM:SS 형태의 현재 재생 위치
# %p: 재생 시간(초) - 전체 재생 시간을 '초' 단위로 환산한 값
# %n: 번호 - 같은 위치에서 여러 장 찍을 때 붙는 번호 (0001...)
# %tY, %tm, %td: 날짜 - 현재 시스템의 년, 월, 일 정보
screenshot-template="%F-%P-%n"

# 파일 포맷 (png, jpg, webp 등)
screenshot-format=png

# 스크린샷 품질 (0-100, png는 압축률)
screenshot-png-compression=7

# 고해상도 영상 캡처 시 성능 향상
screenshot-high-bit-depth=yes

# === OS 전용 설정과 로컬 오버라이드 로드 ===
# mpv 의 include 는 대상 파일이 없으면 에러 메시지를 내므로(git/tmux 의 -q 와 다름),
# jw-stow 가 항상 만들어 두는 안정적인 별명(.platform, 없으면 빈 파일)과
# .skel 로 항상 존재를 보장한 로컬 파일을 include 한다. 반드시 프로필 섹션
# ([youtube-video] 등) 앞, 전역 설정 영역에 있어야 한다.
include=~/.config/mpv/mpv.conf.platform
include=~/.config/mpv/mpv.conf.local

[youtube-video]
profile-cond=path ~= nil and (string.match(path, "youtu%.be") or string.match(path, "youtube%.com"))
ytdl-format=bestvideo[height<=1080][vcodec^=avc1]+bestaudio/best # 4K는 부담스러울 때 1080p 제한

# 유튜브 자막(전달되는 모든 자막)을 자동으로 가져오기
ytdl-raw-options=sub-format="ass/srt/best",write-subs=,write-auto-subs=

[music]
loop-file=inf
video=no
ytdl-format=bestaudio
